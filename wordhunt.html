<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Word Hunt | Spelling Site</title>
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/quiz.css" />
    <link rel="stylesheet" href="css/wordhunt.css" />
  </head>
  <body>
    <header>
      <h1>Spelling Site</h1>
      <nav>
        <a href="index.html">Home</a>
        <a href="quiz.html">Quiz</a>
        <a href="wordhunt.html">Word Hunt</a>
        <a href="wordlist.html">Word List</a>
      </nav>
    </header>

    <main>
      <section class="card quiz-card">
        <h2>Word Hunt</h2>
        <p id="hunt-instructions">Find the hidden spelling word in the grid.</p>
        <div id="wordhunt-grid" class="wordhunt-grid"></div>
        <input id="hunt-answer" type="text" placeholder="Type the word you found" />
        <button id="hunt-submit">Check Word</button>
        <p id="hunt-feedback"></p>
      </section>
    </main>

    <script src="js/wordhunt.js"></script>
  </body>
</html>
